{% extends 'products/base.html' %}
{% block title %}{% if product %}Редактирование{% else %}Создание{% endif %}{%endblock%}
{% block content %}
<h1>{% if product %}Редактирование товара{% else %}Создание товара{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{%endblock%}
